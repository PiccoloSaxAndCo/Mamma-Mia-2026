<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mamma Mia 2026</title>

<style>
body {
  font-family: Arial;
  max-width: 850px;
  margin: auto;
  padding: 15px;
}

h1 { text-align:center; }

.controls {
  text-align:center;
  margin-bottom:10px;
}

button {
  padding:10px;
  margin:5px;
  font-size:16px;
}

#seek {
  width:100%;
}

.time {
  text-align:center;
  font-family: monospace;
  margin-top:5px;
}

.track {
  border:1px solid #ddd;
  border-radius:10px;
  padding:10px;
  margin:10px 0;
}

.row {
  display:flex;
  align-items:center;
  gap:10px;
}

label {
  width:90px;
  font-weight:bold;
}

input[type=range] {
  flex:1;
}

.muteBtn {
  padding:5px 8px;
  font-size:12px;
  border-radius:5px;
  border:1px solid #ccc;
  cursor:pointer;
}

.muteBtn.active {
  background:#e74c3c;
  color:white;
  border-color:#e74c3c;
}
</style>
</head>

<body>

<h1>Mamma Mia 2026</h1>

<div class="controls">
  <button id="play">▶ Play</button>
  <button id="pause">⏸ Pause</button>
  <button id="stop">■ Stop</button>
</div>

<input type="range" id="seek" min="0" max="1000" value="0">
<div class="time" id="time">0:00 / 0:00</div>

<div id="tracks"></div>

<script>
const files = {
  ref: "referenz.mp3",
  sop: "sopran.mp3",
  alt: "alt.mp3",
  ten: "tenor.mp3",
  bas: "bass.mp3"
};

const names = {
  ref: "Ref",
  sop: "Sop",
  alt: "Alt",
  ten: "Ten",
  bas: "Bass"
};

let audio = {};
let duration = 0;
let isPlaying = false;

// ---------- BUILD UI ----------
const container = document.getElementById("tracks");

for (let k in files) {
  const div = document.createElement("div");
  div.className = "track";
  div.innerHTML = `
    <div class="row">
      <label>${names[k]}</label>

      <input type="range" min="0" max="1" step="0.01" value="0.8" id="vol_${k}">

      <button class="muteBtn" id="mute_${k}">Mute</button>
    </div>

    <audio id="${k}" src="${files[k]}" preload="auto"></audio>
  `;

  container.appendChild(div);
}

// ---------- INIT ----------
function init() {
  for (let k in files) {
    audio[k] = document.getElementById(k);
  }

  duration = audio.ref.duration || 0;
}

// ---------- APPLY AUDIO ----------
function applyAudio() {
  for (let k in audio) {

    const vol = parseFloat(document.getElementById("vol_" + k).value);
    const mute = document.getElementById("mute_" + k).classList.contains("active");

    audio[k].volume = mute ? 0 : vol;

    document.getElementById("mute_" + k)
      .classList.toggle("active", mute);
  }
}

// ---------- PLAY ----------
function playAll() {
  init();

  const t = audio.ref.currentTime || 0;

  for (let k in audio) {
    audio[k].currentTime = t;
    audio[k].play();
  }

  isPlaying = true;
  updateUI();
}

// ---------- PAUSE ----------
function pauseAll() {
  for (let k in audio) {
    audio[k].pause();
  }
  isPlaying = false;
}

// ---------- STOP ----------
function stopAll() {
  pauseAll();

  for (let k in audio) {
    audio[k].currentTime = 0;
  }

  document.getElementById("seek").value = 0;
  document.getElementById("time").innerText = "0:00 / 0:00";
}

// ---------- FORMAT ----------
function format(t) {
  const m = Math.floor(t / 60);
  const s = Math.floor(t % 60).toString().padStart(2,"0");
  return `${m}:${s}`;
}

// ---------- UI LOOP ----------
function updateUI() {
  if (!isPlaying) return;

  const ref = audio.ref;

  if (ref && ref.duration) {
    const t = ref.currentTime;

    document.getElementById("seek").value =
      (t / ref.duration) * 1000;

    document.getElementById("time").innerText =
      format(t) + " / " + format(ref.duration);
  }

  applyAudio();

  requestAnimationFrame(updateUI);
}

// ---------- SEEK ----------
document.getElementById("seek").oninput = (e) => {
  const t = (e.target.value / 1000) * audio.ref.duration;

  for (let k in audio) {
    audio[k].currentTime = t;
  }
};

// ---------- EVENTS ----------
document.getElementById("play").onclick = playAll;
document.getElementById("pause").onclick = pauseAll;
document.getElementById("stop").onclick = stopAll;

// ---------- MUTE TOGGLE ----------
setTimeout(() => {
  for (let k in files) {
    document.getElementById("vol_" + k).oninput = applyAudio;

    document.getElementById("mute_" + k).onclick = (e) => {
      e.target.classList.toggle("active");
      applyAudio();
    };
  }
}, 200);
</script>

</body>
</html>
