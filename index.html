<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mamma Mia 2026</title>

<style>
body {
  font-family: Arial;
  max-width: 850px;
  margin: auto;
  padding: 15px;
}

h1 { text-align:center; }

.controls {
  text-align:center;
  margin-bottom:10px;
}

button {
  padding:10px;
  margin:5px;
  font-size:16px;
}

#seek {
  width:100%;
}

.time {
  text-align:center;
  font-family: monospace;
  margin-top:5px;
}

.track {
  border:1px solid #ddd;
  border-radius:10px;
  padding:10px;
  margin:10px 0;
}

.track.active {
  border-color:#4caf50;
  background:#f3fff3;
}

.row {
  display:flex;
  align-items:center;
  gap:8px;
}

label {
  width:80px;
  font-weight:bold;
}

input[type=range] {
  flex:1;
}

.smallbtn {
  padding:5px 7px;
  font-size:12px;
  border-radius:5px;
  border:1px solid #ccc;
  cursor:pointer;
}

.smallbtn.active {
  background:#4caf50;
  color:white;
  border-color:#4caf50;
}
</style>
</head>

<body>

<h1>Mamma Mia 2026</h1>

<div class="controls">
  <button id="play">▶ Play</button>
  <button id="pause">⏸ Pause</button>
  <button id="stop">■ Stop</button>
</div>

<input type="range" id="seek" min="0" max="1000" value="0">
<div class="time" id="time">0:00 / 0:00</div>

<div id="tracks"></div>

<script>
const files = {
  ref: "referenz.mp3",
  sop: "sopran.mp3",
  alt: "alt.mp3",
  ten: "tenor.mp3",
  bas: "bass.mp3"
};

const names = {
  ref: "Ref",
  sop: "Sop",
  alt: "Alt",
  ten: "Ten",
  bas: "Bass"
};

let audio = {};
let state = {
  volume: {},
  mute: {},
  solo: {}
};

let duration = 0;
let isPlaying = false;

// ---------- UI BUILD ----------
const container = document.getElementById("tracks");

for (let k in files) {
  state.volume[k] = 0.8;
  state.mute[k] = false;
  state.solo[k] = false;

  const div = document.createElement("div");
  div.className = "track";
  div.id = "track_" + k;

  div.innerHTML = `
    <div class="row">
      <label>${names[k]}</label>

      <input type="range" min="0" max="1" step="0.01" value="0.8" id="vol_${k}">

      <button class="smallbtn" id="mute_${k}">M</button>
      <button class="smallbtn" id="solo_${k}">S</button>
    </div>

    <audio id="${k}" src="${files[k]}" preload="auto"></audio>
  `;

  container.appendChild(div);
}

// ---------- INIT ----------
function init() {
  for (let k in files) {
    audio[k] = document.getElementById(k);
  }

  duration = audio.ref.duration || 0;
}

// ---------- AUDIO ENGINE (WICHTIG!) ----------
function applyAudioState() {
  const anySolo = Object.values(state.solo).some(v => v);

  for (let k in audio) {
    let vol = state.volume[k];

    if (state.mute[k]) vol = 0;
    if (anySolo && !state.solo[k]) vol = 0;

    audio[k].volume = vol;

    // UI highlight
    document.getElementById("track_" + k)
      .classList.toggle("active", anySolo && state.solo[k]);

    document.getElementById("solo_" + k)
      .classList.toggle("active", state.solo[k]);

    document.getElementById("mute_" + k)
      .classList.toggle("active", state.mute[k]);
  }
}

// ---------- PLAYBACK ----------
function playAll() {
  init();

  const t = audio.ref.currentTime || 0;

  for (let k in audio) {
    audio[k].currentTime = t;
    audio[k].play();
  }

  isPlaying = true;
  updateUI();
}

function pauseAll() {
  for (let k in audio) {
    audio[k].pause();
  }
  isPlaying = false;
}

function stopAll() {
  pauseAll();

  for (let k in audio) {
    audio[k].currentTime = 0;
  }

  document.getElementById("seek").value = 0;
  document.getElementById("time").innerText = "0:00 / 0:00";
}

// ---------- UI UPDATE ----------
function format(t) {
  const m = Math.floor(t / 60);
  const s = Math.floor(t % 60).toString().padStart(2,"0");
  return `${m}:${s}`;
}

function updateUI() {
  if (!isPlaying) return;

  const ref = audio.ref;

  if (ref && ref.duration) {
    const t = ref.currentTime;

    document.getElementById("seek").value =
      (t / ref.duration) * 1000;

    document.getElementById("time").innerText =
      format(t) + " / " + format(ref.duration);
  }

  applyAudioState();

  requestAnimationFrame(updateUI);
}

// ---------- SEEK ----------
document.getElementById("seek").oninput = (e) => {
  const t = (e.target.value / 1000) * audio.ref.duration;

  for (let k in audio) {
    audio[k].currentTime = t;
  }
};

// ---------- EVENTS ----------
document.getElementById("play").onclick = playAll;
document.getElementById("pause").onclick = pauseAll;
document.getElementById("stop").onclick = stopAll;

// ---------- CONTROL BINDING ----------
setTimeout(() => {
  for (let k in files) {

    document.getElementById("vol_" + k).oninput = (e) => {
      state.volume[k] = parseFloat(e.target.value);
      applyAudioState();
    };

    document.getElementById("mute_" + k).onclick = () => {
      state.mute[k] = !state.mute[k];
      applyAudioState();
    };

    document.getElementById("solo_" + k).onclick = () => {
      state.solo[k] = !state.solo[k];
      applyAudioState();
    };
  }
}, 200);
</script>

</body>
</html>
