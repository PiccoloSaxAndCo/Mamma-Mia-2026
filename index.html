<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mamma Mia 2026</title>

<style>
body { font-family: Arial; max-width: 800px; margin:auto; padding:15px; }
h1 { text-align:center; }

button { padding:10px; margin:5px; font-size:16px; }

.track {
  border:1px solid #ddd;
  border-radius:10px;
  padding:10px;
  margin:10px 0;
}

.row {
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

label { width:90px; font-weight:bold; }

input[type=range] { flex:1; }
</style>
</head>

<body>

<h1>Mamma Mia 2026</h1>

<div style="text-align:center;">
  <button id="play">▶ Play</button>
  <button id="pause">⏸ Pause</button>
  <button id="stop">■ Stop</button>
</div>

<div id="tracks"></div>

<script>
const files = {
  ref: "referenz.mp3",
  sop: "sopran.mp3",
  alt: "alt.mp3",
  ten: "tenor.mp3",
  bas: "bass.mp3"
};

const names = {
  ref: "Referenz",
  sop: "Sopran",
  alt: "Alt",
  ten: "Tenor",
  bas: "Bass"
};

// HTML audio elements (IMPORTANT for iOS stability)
const audio = {};
const gainNodes = {};
let ctx;

function initAudioGraph() {
  if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();

  for (let k in files) {
    const a = document.getElementById(k);

    const source = ctx.createMediaElementSource(a);
    const gain = ctx.createGain();

    source.connect(gain).connect(ctx.destination);

    gain.gain.value = 0.8;

    gainNodes[k] = gain;
  }
}

// UI build
const container = document.getElementById("tracks");

for (let k in files) {
  const div = document.createElement("div");
  div.className = "track";

  div.innerHTML = `
    <div class="row">
      <label>${names[k]}</label>
      <input type="range" min="0" max="1" step="0.01" value="0.8" id="vol_${k}">
    </div>

    <audio id="${k}" src="${files[k]}" preload="auto"></audio>
  `;

  container.appendChild(div);
}

// volume controls
function attachSliders() {
  for (let k in files) {
    document.getElementById("vol_" + k).oninput = (e) => {
      gainNodes[k].gain.value = parseFloat(e.target.value);
    };
  }
}

// sync play
function playAll() {
  initAudioGraph();

  for (let k in files) {
    const a = document.getElementById(k);
    a.play();
  }
}

// pause
function pauseAll() {
  for (let k in files) {
    document.getElementById(k).pause();
  }
}

// stop
function stopAll() {
  for (let k in files) {
    const a = document.getElementById(k);
    a.pause();
    a.currentTime = 0;
  }
}

// buttons
document.getElementById("play").onclick = () => {
  initAudioGraph();
  attachSliders();
  playAll();
};

document.getElementById("pause").onclick = pauseAll;
document.getElementById("stop").onclick = stopAll;
</script>

</body>
</html>
