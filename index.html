<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mamma Mia 2026</title>

<style>
body {
  font-family: Arial;
  max-width: 850px;
  margin: auto;
  padding: 15px;
}

h1 { text-align:center; }

.controls {
  text-align:center;
  margin-bottom:10px;
}

button {
  padding:10px;
  margin:5px;
  font-size:16px;
}

#seek {
  width:100%;
}

.time {
  text-align:center;
  margin-top:5px;
  font-family: monospace;
}

/* 🔧 FIX: keine Umbrüche mehr */
.track {
  border:1px solid #ddd;
  border-radius:10px;
  padding:10px;
  margin:10px 0;
}

.row {
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:nowrap; /* IMPORTANT FIX */
}

label {
  width:80px;
  font-weight:bold;
  font-size:14px;
}

/* Slider kompakter */
input[type=range] {
  flex:1;
  min-width:80px;
}

/* Buttons kompakt + fix gleiche Höhe */
.smallbtn {
  padding:5px 6px;
  font-size:11px;
  border-radius:5px;
  border:1px solid #ccc;
  white-space:nowrap;
}

.smallbtn.active {
  background:#4caf50;
  color:white;
  border-color:#4caf50;
}

/* Mobile extra kompakt */
@media (max-width: 500px) {
  label { width:65px; font-size:12px; }
  .smallbtn { font-size:10px; padding:4px 5px; }
}
</style>
</head>

<body>

<h1>Mamma Mia 2026</h1>

<div class="controls">
  <button id="play">▶ Play</button>
  <button id="pause">⏸ Pause</button>
  <button id="stop">■ Stop</button>
</div>

<input type="range" id="seek" min="0" max="1000" value="0">
<div class="time" id="time">0:00 / 0:00</div>

<div id="tracks"></div>

<script>
const files = {
  ref: "referenz.mp3",
  sop: "sopran.mp3",
  alt: "alt.mp3",
  ten: "tenor.mp3",
  bas: "bass.mp3"
};

const names = {
  ref: "Ref",
  sop: "Sop",
  alt: "Alt",
  ten: "Ten",
  bas: "Bass"
};

let audios = {};
let solo = {};
let mute = {};
let duration = 0;

// UI build
const container = document.getElementById("tracks");

for (let k in files) {
  solo[k] = false;
  mute[k] = false;

  const div = document.createElement("div");
  div.className = "track";
  div.id = "track_" + k;

  div.innerHTML = `
    <div class="row">
      <label>${names[k]}</label>

      <input type="range" min="0" max="1" step="0.01" value="0.8" id="vol_${k}">

      <button class="smallbtn" id="mute_${k}">M</button>
      <button class="smallbtn" id="solo_${k}">S</button>
    </div>

    <audio id="${k}" src="${files[k]}" preload="auto"></audio>
  `;

  container.appendChild(div);
}

// init
function init() {
  for (let k in files) {
    audios[k] = document.getElementById(k);
  }

  duration = audios.ref.duration || 0;
}

// 🔧 FIX: Lautstärke robust
function applyMix() {
  const anySolo = Object.values(solo).some(v => v);

  for (let k in audios) {
    let vol = parseFloat(document.getElementById("vol_" + k).value);

    if (mute[k]) vol = 0;
    if (anySolo && !solo[k]) vol = 0;

    audios[k].volume = vol;

    // UI
    document.getElementById("solo_" + k).classList.toggle("active", solo[k]);
  }
}

// play
function playAll() {
  init();

  const t = audios.ref.currentTime || 0;

  for (let k in audios) {
    audios[k].currentTime = t;
    audios[k].play();
  }

  updateUI();
}

// pause
function pauseAll() {
  for (let k in audios) {
    audios[k].pause();
  }
}

// stop
function stopAll() {
  pauseAll();

  for (let k in audios) {
    audios[k].currentTime = 0;
  }

  document.getElementById("seek").value = 0;
  document.getElementById("time").innerText = "0:00 / 0:00";
}

// format
function format(t) {
  const m = Math.floor(t / 60);
  const s = Math.floor(t % 60).toString().padStart(2,"0");
  return `${m}:${s}`;
}

// UI update
function updateUI() {
  const ref = audios.ref;

  if (!ref || !ref.duration) return;

  const t = ref.currentTime;

  document.getElementById("seek").value = (t / ref.duration) * 1000;

  document.getElementById("time").innerText =
    format(t) + " / " + format(ref.duration);

  applyMix();

  requestAnimationFrame(updateUI);
}

// seek
document.getElementById("seek").oninput = (e) => {
  const t = (e.target.value / 1000) * audios.ref.duration;

  for (let k in audios) {
    audios[k].currentTime = t;
  }
};

// buttons
document.getElementById("play").onclick = playAll;
document.getElementById("pause").onclick = pauseAll;
document.getElementById("stop").onclick = stopAll;

// events
setTimeout(() => {
  for (let k in files) {

    document.getElementById("vol_" + k).oninput = applyMix;

    document.getElementById("mute_" + k).onclick = () => {
      mute[k] = !mute[k];
      applyMix();
    };

    document.getElementById("solo_" + k).onclick = () => {
      solo[k] = !solo[k];
      applyMix();
    };
  }
}, 200);
</script>

</body>
</html>
