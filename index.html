<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mamma Mia 2026</title>

<style>
body {
  font-family: Arial;
  max-width: 850px;
  margin: auto;
  padding: 15px;
}

h1 { text-align: center; }

.controls {
  text-align: center;
  margin-bottom: 10px;
}

button {
  padding: 10px;
  margin: 5px;
  font-size: 16px;
}

#seek {
  width: 100%;
  margin: 10px 0 20px 0;
}

.track {
  border: 1px solid #ddd;
  border-radius: 10px;
  padding: 10px;
  margin: 10px 0;
}

.row {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

label {
  width: 90px;
  font-weight: bold;
}

input[type=range] {
  flex: 1;
}
</style>
</head>

<body>

<h1>Mamma Mia 2026</h1>

<div class="controls">
  <button id="play">▶ Play</button>
  <button id="pause">⏸ Pause</button>
  <button id="stop">■ Stop</button>
</div>

<input type="range" id="seek" min="0" max="1000" value="0">

<div id="tracks"></div>

<script>
const files = {
  ref: "referenz.mp3",
  sop: "sopran.mp3",
  alt: "alt.mp3",
  ten: "tenor.mp3",
  bas: "bass.mp3"
};

const names = {
  ref: "Referenz",
  sop: "Sopran",
  alt: "Alt",
  ten: "Tenor",
  bas: "Bass"
};

let audios = {};
let gains = {};
let ctx;

let isPlaying = false;
let startTime = 0;
let pauseOffset = 0;
let duration = 0;

// init audio graph
function init() {
  if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();

  for (let k in files) {
    const a = document.getElementById(k);

    const source = ctx.createMediaElementSource(a);
    const gain = ctx.createGain();

    source.connect(gain).connect(ctx.destination);

    gain.gain.value = 0.8;

    gains[k] = gain;
    audios[k] = a;
  }

  duration = audios.ref.duration || 1;
}

// UI build
const container = document.getElementById("tracks");

for (let k in files) {
  const div = document.createElement("div");
  div.className = "track";

  div.innerHTML = `
    <div class="row">
      <label>${names[k]}</label>
      <input type="range" min="0" max="1" step="0.01" value="0.8" id="vol_${k}">
    </div>

    <audio id="${k}" src="${files[k]}" preload="auto"></audio>
  `;

  container.appendChild(div);
}

// sliders
function attachSliders() {
  for (let k in files) {
    document.getElementById("vol_" + k).oninput = (e) => {
      gains[k].gain.value = parseFloat(e.target.value);
    };
  }
}

// play
function playAll() {
  init();

  const offset = pauseOffset;

  for (let k in audios) {
    audios[k].currentTime = offset;
    audios[k].play();
  }

  startTime = Date.now() / 1000 - offset;
  isPlaying = true;

  updateSeek();
}

// pause
function pauseAll() {
  for (let k in audios) {
    audios[k].pause();
  }

  pauseOffset = getTime();
  isPlaying = false;
}

// stop
function stopAll() {
  pauseAll();

  pauseOffset = 0;

  for (let k in audios) {
    audios[k].currentTime = 0;
  }

  document.getElementById("seek").value = 0;
}

// time
function getTime() {
  return Date.now() / 1000 - startTime;
}

// progress FIX
function updateSeek() {
  if (!isPlaying) return;

  const t = getTime();
  const percent = (t / duration) * 1000;

  document.getElementById("seek").value = percent;

  requestAnimationFrame(updateSeek);
}

// seek
document.getElementById("seek").oninput = (e) => {
  const t = (e.target.value / 1000) * duration;

  pauseAll();
  pauseOffset = t;
};

// buttons
document.getElementById("play").onclick = () => {
  init();
  attachSliders();
  playAll();
};

document.getElementById("pause").onclick = pauseAll;
document.getElementById("stop").onclick = stopAll;
</script>

</body>
</html>
