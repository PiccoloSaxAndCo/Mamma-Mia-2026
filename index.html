<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mamma Mia 2026</title>

<style>
body {
  font-family: Arial;
  max-width: 850px;
  margin: auto;
  padding: 15px;
}

h1 { text-align:center; }

.controls {
  text-align:center;
  margin-bottom:10px;
}

button {
  padding:10px;
  margin:5px;
  font-size:16px;
}

#seek {
  width:100%;
  margin:10px 0 20px 0;
}

.track {
  border:1px solid #ddd;
  border-radius:10px;
  padding:10px;
  margin:10px 0;
}

.row {
  display:flex;
  align-items:center;
  gap:10px;
}

label {
  width:90px;
  font-weight:bold;
}
</style>
</head>

<body>

<h1>Mamma Mia 2026</h1>

<div class="controls">
  <button id="play">▶ Play</button>
  <button id="pause">⏸ Pause</button>
  <button id="stop">■ Stop</button>
</div>

<input type="range" id="seek" min="0" max="1000" value="0">

<div id="tracks"></div>

<script>
const files = {
  ref: "referenz.mp3",
  sop: "sopran.mp3",
  alt: "alt.mp3",
  ten: "tenor.mp3",
  bas: "bass.mp3"
};

const names = {
  ref: "Referenz",
  sop: "Sopran",
  alt: "Alt",
  ten: "Tenor",
  bas: "Bass"
};

let audios = {};
let duration = 1;
let isPlaying = false;

// UI
const container = document.getElementById("tracks");

for (let k in files) {
  const div = document.createElement("div");
  div.className = "track";

  div.innerHTML = `
    <div class="row">
      <label>${names[k]}</label>
      <input type="range" min="0" max="1" step="0.01" value="0.8" id="vol_${k}">
    </div>

    <audio id="${k}" src="${files[k]}" preload="auto"></audio>
  `;

  container.appendChild(div);
}

// init
function init() {
  for (let k in files) {
    audios[k] = document.getElementById(k);
  }

  duration = audios.ref.duration || 1;
}

// play
function playAll() {
  init();

  const t = audios.ref.currentTime || 0;

  for (let k in audios) {
    audios[k].currentTime = t;
    audios[k].play();
  }

  isPlaying = true;
  updateSeek();
}

// pause
function pauseAll() {
  for (let k in audios) {
    audios[k].pause();
  }
  isPlaying = false;
}

// stop
function stopAll() {
  pauseAll();

  for (let k in audios) {
    audios[k].currentTime = 0;
  }

  document.getElementById("seek").value = 0;
}

// progress (WICHTIG: basiert auf ref audio!)
function updateSeek() {
  if (!isPlaying) return;

  const ref = audios.ref;

  if (ref && ref.duration) {
    const percent = (ref.currentTime / ref.duration) * 1000;
    document.getElementById("seek").value = percent;
  }

  requestAnimationFrame(updateSeek);
}

// seek
document.getElementById("seek").oninput = (e) => {
  const t = (e.target.value / 1000) * audios.ref.duration;

  for (let k in audios) {
    audios[k].currentTime = t;
  }
};

// volume
function attachVolume() {
  for (let k in files) {
    document.getElementById("vol_" + k).oninput = (e) => {
      audios[k].volume = parseFloat(e.target.value);
    };
  }
}

// buttons
document.getElementById("play").onclick = () => {
  init();
  attachVolume();
  playAll();
};

document.getElementById("pause").onclick = pauseAll;
document.getElementById("stop").onclick = stopAll;
</script>

</body>
</html>
