<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mamma Mia 2026</title>

<style>
body {
  font-family: Arial;
  max-width: 850px;
  margin: auto;
  padding: 15px;
}

h1 { text-align:center; }

.controls {
  text-align:center;
  margin-bottom:10px;
}

button {
  padding:10px;
  margin:5px;
  font-size:16px;
}

#seek {
  width:100%;
}

.time {
  text-align:center;
  margin-top:5px;
  font-family: monospace;
}

.track {
  border:1px solid #ddd;
  border-radius:10px;
  padding:10px;
  margin:10px 0;
}

.track.active {
  border-color:#4caf50;
  background:#f4fff4;
}

.row {
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

label {
  width:90px;
  font-weight:bold;
}

input[type=range] {
  flex:1;
}

.smallbtn {
  padding:6px 8px;
  font-size:12px;
  border-radius:5px;
  border:1px solid #ccc;
  cursor:pointer;
}

.smallbtn.active {
  background:#4caf50;
  color:white;
  border-color:#4caf50;
}
</style>
</head>

<body>

<h1>Mamma Mia 2026</h1>

<div class="controls">
  <button id="play">▶ Play</button>
  <button id="pause">⏸ Pause</button>
  <button id="stop">■ Stop</button>
</div>

<input type="range" id="seek" min="0" max="1000" value="0">
<div class="time" id="time">0:00 / 0:00</div>

<div id="tracks"></div>

<script>
const files = {
  ref: "referenz.mp3",
  sop: "sopran.mp3",
  alt: "alt.mp3",
  ten: "tenor.mp3",
  bas: "bass.mp3"
};

const names = {
  ref: "Referenz",
  sop: "Sopran",
  alt: "Alt",
  ten: "Tenor",
  bas: "Bass"
};

let audios = {};
let duration = 0;

let solo = {};
let mute = {};

const container = document.getElementById("tracks");

// UI build
for (let k in files) {
  solo[k] = false;
  mute[k] = false;

  const div = document.createElement("div");
  div.className = "track";
  div.id = "track_" + k;

  div.innerHTML = `
    <div class="row">
      <label>${names[k]}</label>

      <input type="range" min="0" max="1" step="0.01" value="0.8" id="vol_${k}">

      <button class="smallbtn" id="mute_${k}">Mute</button>
      <button class="smallbtn" id="solo_${k}">Solo</button>
    </div>

    <audio id="${k}" src="${files[k]}" preload="auto"></audio>
  `;

  container.appendChild(div);
}

// init
function init() {
  for (let k in files) {
    audios[k] = document.getElementById(k);
  }

  duration = audios.ref.duration || 0;
}

// volume logic
function applyMix() {
  const anySolo = Object.values(solo).some(v => v);

  for (let k in audios) {
    const a = audios[k];

    let vol = document.getElementById("vol_" + k).value;

    if (mute[k]) vol = 0;
    if (anySolo && !solo[k]) vol = 0;

    a.volume = vol;

    // UI highlight
    const el = document.getElementById("track_" + k);
    const soloBtn = document.getElementById("solo_" + k);

    soloBtn.classList.toggle("active", solo[k]);
    el.classList.toggle("active", anySolo && solo[k]);
  }
}

// play
function playAll() {
  init();

  const t = audios.ref.currentTime || 0;

  for (let k in audios) {
    audios[k].currentTime = t;
    audios[k].play();
  }

  updateUI();
}

// pause
function pauseAll() {
  for (let k in audios) {
    audios[k].pause();
  }
}

// stop
function stopAll() {
  pauseAll();

  for (let k in audios) {
    audios[k].currentTime = 0;
  }

  document.getElementById("seek").value = 0;
  document.getElementById("time").innerText = "0:00 / " + format(duration);
}

// time format
function format(s) {
  if (!s) return "0:00";
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60).toString().padStart(2, "0");
  return `${m}:${sec}`;
}

// UI update
function updateUI() {
  const ref = audios.ref;

  if (!ref || !ref.duration) return;

  const t = ref.currentTime;

  document.getElementById("seek").value = (t / ref.duration) * 1000;

  document.getElementById("time").innerText =
    format(t) + " / " + format(ref.duration);

  applyMix();

  requestAnimationFrame(updateUI);
}

// seek
document.getElementById("seek").oninput = (e) => {
  const t = (e.target.value / 1000) * audios.ref.duration;

  for (let k in audios) {
    audios[k].currentTime = t;
  }
};

// controls
document.getElementById("play").onclick = playAll;
document.getElementById("pause").onclick = pauseAll;
document.getElementById("stop").onclick = stopAll;

// attach events after build
setTimeout(() => {
  for (let k in files) {

    document.getElementById("vol_" + k).oninput = applyMix;

    document.getElementById("mute_" + k).onclick = () => {
      mute[k] = !mute[k];
      applyMix();
    };

    document.getElementById("solo_" + k).onclick = () => {
      solo[k] = !solo[k];
      applyMix();
    };
  }
}, 300);
</script>

</body>
</html>
